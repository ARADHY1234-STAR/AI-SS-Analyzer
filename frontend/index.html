<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Engine - Session Insights</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>
<body class="font-sans min-h-screen antialiased text-slate-800 selection:bg-indigo-200 relative overflow-x-hidden">
    <!-- Ambient Animated Background Orbs -->
    <div style="position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden;">
        <div class="animate-float-orb" style="position:absolute; top:-10%; left:-10%; width:40%; height:40%; border-radius:9999px; background:rgba(99,102,241,0.2); filter:blur(100px); animation-delay:0s;"></div>
        <div class="animate-float-orb" style="position:absolute; bottom:-10%; right:-10%; width:50%; height:50%; border-radius:9999px; background:rgba(168,85,247,0.2); filter:blur(120px); animation-delay:-5s; animation-direction:reverse;"></div>
        <div class="animate-float-orb" style="position:absolute; top:40%; left:60%; width:30%; height:30%; border-radius:9999px; background:rgba(236,72,153,0.15); filter:blur(80px); animation-delay:-10s;"></div>
    </div>

    <div class="max-w-6xl mx-auto p-4 md:p-8 space-y-8 relative z-10">
        
        <!-- Header -->
        <header class="flex flex-col md:flex-row md:items-center md:justify-between pb-6 border-b border-indigo-100/50 gap-6">
            <div>
                <div class="flex items-center gap-2 mb-2">
                    <span class="relative flex h-2.5 w-2.5">
                      <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                      <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.5)]"></span>
                    </span>
                    <span class="text-[10px] font-bold tracking-widest text-indigo-600 uppercase">Local Analysis Server Active</span>
                </div>
                <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 via-purple-600 to-pink-600 mt-1 pb-1">
                    Productivity Insights
                </h1>
                <p class="text-slate-500 text-sm mt-2 font-medium max-w-xl">Evaluate engineering workflow metrics via local VLM pipelines. Upload session screenshots for deep semantic analysis.</p>
            </div>
            
            <div class="glass-panel p-3 rounded-2xl min-w-[360px]">
                <form id="uploadForm" class="flex flex-col gap-3 relative">
                    <div class="absolute -inset-1 bg-gradient-to-r from-indigo-300 to-purple-300 rounded-2xl opacity-20 group-hover:opacity-40 transition duration-300 blur-lg -z-10"></div>
                    <div class="flex items-center gap-3">
                        <div class="flex-1 relative group">
                            <input type="file" id="screenshots" name="screenshots" accept="image/*" multiple required
                                class="relative block w-full text-xs text-slate-600 file:mr-3 file:py-2.5 file:px-4 file:rounded-xl file:border-0 file:text-xs file:font-bold file:bg-indigo-50 file:text-indigo-600 hover:file:bg-indigo-100 hover:file:text-indigo-700 cursor-pointer bg-white/60 rounded-xl border border-indigo-100 focus:outline-none focus:border-indigo-400 transition-colors shadow-sm">
                        </div>
                        <button type="submit" id="submitBtn"
                            class="bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white hover:scale-105 active:scale-95 text-sm font-bold py-2.5 px-6 rounded-xl transition-all flex items-center shrink-0 shadow-lg shadow-indigo-200">
                            <span>Analyze</span>
                            <svg id="loadingSpinner" class="animate-spin ml-2 h-4 w-4 hidden text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>
                        </button>
                    </div>
                    <div class="flex items-center gap-2">
                        <label for="modelSelect" style="font-size: 0.65rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #6366f1; white-space: nowrap;">AI Engine:</label>
                        <select id="modelSelect" style="
                            width: 100%;
                            font-family: 'Outfit', sans-serif;
                            font-size: 0.75rem;
                            font-weight: 600;
                            color: #334155;
                            background: rgba(255,255,255,0.7);
                            border: 1px solid #e0e7ff;
                            border-radius: 0.625rem;
                            padding: 0.4rem 0.75rem;
                            outline: none;
                            cursor: pointer;
                            transition: border-color 0.15s;
                            appearance: auto;
                        " onfocus="this.style.borderColor='#818cf8'" onblur="this.style.borderColor='#e0e7ff'">
                            <option value="meta-llama/llama-4-scout-17b-16e-instruct">Groq Llama 4 Scout (Default)</option>
  
  <!-- Verified Active Free Vision Models (July 2026) -->
  <option value="google/gemma-4-26b-a4b-it:free">Google Gemma 4 Vision (Free)</option>
  <option value="nvidia/nemotron-3-nano-omni-30b-a3b-reasoning:free">NVIDIA Nano Omni (Free)</option>
  <option value="nvidia/nemotron-nano-12b-v2-vl:free">NVIDIA Nano VL (Free)</option>
  <option value="openrouter/free">OpenRouter Auto-Free Router</option>
  
  <!-- Paid / Budget Fallbacks (Add these if free ones hit rate limits) -->
  <option value="google/gemini-3.1-flash-lite">Gemini 3.1 Flash Lite (Ultra Cheap Paid)</option>
  <option value="google/gemini-2.5-flash">Gemini 2.5 Flash (Ultra Cheap Paid)</option>
                        </select>
                    </div>
                    <div class="flex items-center gap-2">
                        <label for="personaSelect" style="font-size: 0.65rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #6366f1; white-space: nowrap;">Persona:</label>
                        <select id="personaSelect" style="
                            width: 100%;
                            font-family: 'Outfit', sans-serif;
                            font-size: 0.75rem;
                            font-weight: 600;
                            color: #334155;
                            background: rgba(255,255,255,0.7);
                            border: 1px solid #e0e7ff;
                            border-radius: 0.625rem;
                            padding: 0.4rem 0.75rem;
                            outline: none;
                            cursor: pointer;
                            transition: border-color 0.15s;
                            appearance: auto;
                        " onfocus="this.style.borderColor='#818cf8'" onblur="this.style.borderColor='#e0e7ff'">
                            <option value="default_general">Default / General</option>
                            <option value="backend_dev">Deep-Focus Coder</option>
                            <option value="ui_designer">UI/UX & Frontend Dev</option>
                            <option value="architect">System Architect / Reviewer</option>
                            <option value="qa_engineer">QA / Test Specialist</option>
                            <option value="data_analyst">Data Analyst / Modeler</option>
                        </select>
                    </div>
                    <div class="flex items-center gap-2 mt-1">
                        <input type="checkbox" id="includeKeystrokes" class="w-3.5 h-3.5 text-indigo-600 bg-white border-indigo-200 rounded focus:ring-indigo-500 focus:ring-2 cursor-pointer shadow-sm">
                        <label for="includeKeystrokes" style="font-size: 0.65rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #6366f1; white-space: nowrap; cursor: pointer;">Include Keystrokes & Mouse</label>
                    </div>
                </form>
            </div>
        </header>

        <div id="errorMsg" class="hidden text-rose-700 text-sm font-medium bg-rose-50/80 glass-panel p-4 rounded-xl border border-rose-200 flex items-start gap-3">
            <svg class="w-5 h-5 text-rose-500 shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <div id="errorText"></div>
        </div>

        <main id="resultsDashboard" class="hidden grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="lg:col-span-2 space-y-8">
                
                <!-- Main Score Card -->
                <div class="glass-panel rounded-3xl p-8 flex flex-col md:flex-row items-center gap-10 relative overflow-hidden">
                    <div class="absolute -top-32 -right-32 w-64 h-64 bg-indigo-200/40 rounded-full blur-3xl"></div>
                    <div class="absolute -bottom-32 -left-32 w-64 h-64 bg-purple-200/40 rounded-full blur-3xl"></div>

                    <div class="relative flex items-center justify-center shrink-0 gauge-glow z-10">
                        <svg class="w-48 h-48 transform -rotate-90">
                            <circle cx="96" cy="96" r="84" stroke-width="8" stroke="#f1f5f9" fill="transparent" />
                            <circle id="scoreGauge" cx="96" cy="96" r="84" stroke-width="12" stroke-linecap="round" fill="transparent"
                                stroke-dasharray="527.78" stroke-dashoffset="527.78" class="stroke-indigo-500" />
                        </svg>
                        <div class="absolute flex flex-col items-center justify-center text-center">
                            <span id="finalScore" class="text-6xl font-black text-slate-800 tracking-tighter drop-shadow-sm">0</span>
                            <span class="text-[11px] uppercase font-extrabold tracking-widest text-slate-400 mt-2">Score</span>
                        </div>
                    </div>

                    <div class="space-y-5 flex-1 w-full text-center md:text-left z-10">
                        <div class="flex flex-wrap items-center justify-center md:justify-start gap-3">
                            <span id="progressBadge" class="px-3.5 py-1.5 rounded-lg text-xs font-bold uppercase tracking-widest shadow-sm"></span>
                            <div class="flex items-center gap-2 bg-slate-100/80 text-slate-600 px-3.5 py-1.5 rounded-lg text-xs font-semibold border border-slate-200/50 shadow-sm">
                                <svg class="w-4 h-4 text-indigo-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>
                                AI Confidence: <span id="confidenceScore" class="font-mono text-indigo-600 ml-1">0%</span>
                            </div>
                            <div class="flex items-center gap-2 bg-slate-100/80 text-slate-600 px-3.5 py-1.5 rounded-lg text-xs font-semibold border border-slate-200/50 shadow-sm">
                                🤖 Model: <span id="modelUsedValue" class="font-mono text-indigo-600 ml-1">Default</span>
                            </div>
                        </div>
                        <h2 id="vlmTask" class="text-2xl md:text-3xl font-bold text-slate-800 leading-tight"></h2>
                    </div>
                </div>

                <!-- Evidence Card -->
                <div class="glass-panel rounded-3xl p-8">
                    <div class="flex items-center gap-4 mb-8">
                        <div class="h-10 w-10 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-500 shadow-lg shadow-indigo-200 flex items-center justify-center">
                            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                        </div>
                        <h3 class="text-base font-bold tracking-wider text-slate-800 uppercase">Reasoning & Evidence</h3>
                    </div>
                    <div id="activitySummaryBlock" class="hidden mb-8"></div>
                    <ul id="vlmEvidence" class="space-y-6 relative border-l-2 border-indigo-100 pl-6 ml-4">
                    </ul>
                </div>
            </div>

            <div class="space-y-8">
                
                <!-- Signal Contributions Card -->
                <div class="glass-panel rounded-3xl p-7 relative overflow-hidden">
                    <h3 class="text-xs font-bold tracking-widest text-slate-400 uppercase mb-6 flex items-center gap-2">
                        <svg class="w-4 h-4 text-pink-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 3.055A9.001 9.001 0 1020.945 13H11V3.055z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.488 9H15V3.512A9.025 9.025 0 0120.488 9z"></path></svg>
                        Signal Contributions
                    </h3>
                    <div class="space-y-5" id="metricsBreakdown">
                    </div>
                </div>

                <!-- Domain Matrix Card -->
                <div class="glass-panel rounded-3xl p-7">
                    <h3 class="text-xs font-bold tracking-widest text-slate-400 uppercase mb-6 flex items-center gap-2">
                        <svg class="w-4 h-4 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                        Domain Matrix
                    </h3>
                    <div class="grid grid-cols-1 gap-3" id="domainActivity">
                    </div>
                </div>
            </div>

            <!-- JSON Telemetry Card -->
            <div class="col-span-1 lg:col-span-3 bg-slate-900 rounded-3xl shadow-2xl overflow-hidden mt-2 relative">
                <div class="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAiIGhlaWdodD0iMjAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGNpcmNsZSBjeD0iMiIgY3k9IjIiIHI9IjEiIGZpbGw9IiMzMzQxNTUiLz48L3N2Zz4=')] opacity-20"></div>
                <div class="bg-slate-950/80 backdrop-blur px-6 py-4 flex justify-between items-center border-b border-slate-800 relative z-10">
                    <span class="text-xs font-bold font-mono tracking-widest text-slate-400 uppercase flex items-center gap-3">
                        <span class="relative flex h-2 w-2">
                            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>
                            <span class="relative inline-flex rounded-full h-2 w-2 bg-blue-500"></span>
                        </span> 
                        Raw JSON Telemetry
                    </span>
                </div>
                <pre class="p-6 text-sm font-mono text-cyan-400 overflow-x-auto json-scroll leading-relaxed max-h-[400px] relative z-10" id="rawJson"></pre>
            </div>
        </main>
    </div>

    <script>
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const fileInput = document.getElementById('screenshots');
            const submitBtn = document.getElementById('submitBtn');
            const spinner = document.getElementById('loadingSpinner');
            const errorMsg = document.getElementById('errorMsg');
            const errorText = document.getElementById('errorText');
            const resultsDashboard = document.getElementById('resultsDashboard');

            errorMsg.classList.add('hidden');
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-70', 'cursor-not-allowed');
            spinner.classList.remove('hidden');

            const formData = new FormData();
            for (let i = 0; i < fileInput.files.length; i++) {
                formData.append('screenshots', fileInput.files[i]);
            }

            // Append selected model override from dropdown
            const selectedModel = document.getElementById('modelSelect').value;
            if (selectedModel) {
                formData.append('model_override', selectedModel);
            }

            // Append selected persona
            const selectedPersona = document.getElementById('personaSelect').value;
            if (selectedPersona) {
                formData.append('persona_id', selectedPersona);
            }

            // Append keystroke toggle
            const includeKeystrokes = document.getElementById('includeKeystrokes').checked;
            formData.append('include_keystrokes', includeKeystrokes ? 'true' : 'false');

            try {
                const response = await fetch('http://127.0.0.1:8000/api/v1/sessions/analyze', {
                    method: 'POST',
                    body: formData
                });
                
                let data;
                try {
                    data = await response.json();
                } catch (jsonErr) {
                    const text = await response.text();
                    throw new Error(`Invalid JSON from server. Status: ${response.status}.`);
                }
                
                if (!response.ok) {
                    let errMsg = data.detail || `HTTP ${response.status}`;
                    if (Array.isArray(errMsg) || typeof errMsg === 'object') errMsg = JSON.stringify(errMsg);
                    throw new Error(errMsg);
                }
                renderResults(data);
            } catch (err) {
                console.error(err);
                errorText.innerHTML = `<span class="font-bold">Execution Error:</span> ${err.message}. Check backend connection.`;
                errorMsg.classList.remove('hidden');
            } finally {
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-70', 'cursor-not-allowed');
                spinner.classList.add('hidden');
            }
        });

        function renderResults(data) {
            document.getElementById('resultsDashboard').classList.remove('hidden');
            document.getElementById('resultsDashboard').classList.add('animate-fade-in');

            // 1. Format Core Score values (Multiply by 100 for display)
            const score = data.final_score; 
            document.getElementById('finalScore').textContent = (score * 100).toFixed(0);
            document.getElementById('confidenceScore').textContent = (data.confidence * 100).toFixed(0) + "%";
            document.getElementById('modelUsedValue').textContent = data.model_used || "Default";
            document.getElementById('vlmTask').textContent = data.vlm_summary.task_description;

            // Handle Gauge Ring configuration 
            const gaugeCircle = document.getElementById('scoreGauge');
            const radius = 84;
            const circumference = 2 * Math.PI * radius; // ~527.78
            const offset = circumference - (score * circumference);
            
            // Allow a small delay before drawing gauge for animation effect
            setTimeout(() => {
                gaugeCircle.style.strokeDashoffset = offset;
            }, 100);

            // Highly vibrant color-coding logic
            let performanceClass = "stroke-rose-500";
            let textBgClass = "bg-rose-100 text-rose-700 border border-rose-200";
            
            if (score >= 0.70) {
                performanceClass = "stroke-emerald-400";
                textBgClass = "bg-emerald-100 text-emerald-700 border border-emerald-200";
            } else if (score >= 0.40) {
                performanceClass = "stroke-amber-400";
                textBgClass = "bg-amber-100 text-amber-700 border border-amber-200";
            }
            
            // Reset classes and apply new
            gaugeCircle.setAttribute('class', `transition-all duration-1000 ease-out ${performanceClass}`);

            const progressBadge = document.getElementById('progressBadge');
            const isProgressed = data.vlm_summary.progressed && (score * 100 >= 15);
            progressBadge.textContent = isProgressed ? "Progress Confirmed" : "Stagnant / Idle";
            
            const badgeBgClass = isProgressed 
                ? "bg-emerald-100 text-emerald-700 border border-emerald-200" 
                : "bg-rose-100 text-rose-700 border border-rose-200";
            progressBadge.className = `px-3.5 py-1.5 rounded-lg text-xs font-bold uppercase tracking-widest shadow-sm ${badgeBgClass}`;

            // Render Activity Summary (AI's inferred behavior between screenshots)
            const activityBlock = document.getElementById('activitySummaryBlock');
            const activityItems = data.vlm_summary.activity_summary || [];
            
            if (activityItems.length > 0) {
                activityBlock.classList.remove('hidden');
                activityBlock.innerHTML = `
                    <div style="background: linear-gradient(135deg, rgba(99,102,241,0.08) 0%, rgba(168,85,247,0.08) 50%, rgba(236,72,153,0.06) 100%); border: 1px solid rgba(99,102,241,0.15); border-radius: 1rem; padding: 1.25rem 1.5rem; position: relative; overflow: hidden;">
                        <div style="position: absolute; top: -20px; right: -20px; width: 80px; height: 80px; background: radial-gradient(circle, rgba(99,102,241,0.12) 0%, transparent 70%); border-radius: 50%;"></div>
                        <div style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.75rem;">
                            <span style="font-size: 1.1rem;">🧠</span>
                            <span style="font-size: 0.65rem; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; color: #6366f1;">Activity Snapshot</span>
                        </div>
                        <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                            ${activityItems.map((item, i) => `
                                <div class="animate-slide-up" style="display: flex; align-items: flex-start; gap: 0.625rem; animation-delay: ${i * 80}ms;">
                                    <span style="flex-shrink: 0; margin-top: 0.3rem; width: 6px; height: 6px; border-radius: 50%; background: linear-gradient(135deg, #6366f1, #a855f7); box-shadow: 0 0 6px rgba(99,102,241,0.4);"></span>
                                    <span style="font-size: 0.8125rem; font-weight: 500; color: #334155; line-height: 1.5;">${item}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            } else {
                activityBlock.classList.add('hidden');
                activityBlock.innerHTML = '';
            }

            // Semantic evidence tagging logic
            const evidenceUl = document.getElementById('vlmEvidence');
            evidenceUl.innerHTML = '';
            
            data.vlm_summary.evidence.forEach((item, index) => {
                const li = document.createElement('li');
                li.className = "relative group";
                li.style.animationDelay = `${index * 100}ms`;
                li.classList.add('animate-slide-up', 'opacity-0');
                
                // Trigger animation after adding to DOM
                setTimeout(() => li.classList.remove('opacity-0'), 50);

                if (item.includes(':')) {
                    const splitIndex = item.indexOf(':');
                    const title = item.substring(0, splitIndex).trim();
                    const text = item.substring(splitIndex + 1).trim();
                    
                    let badgeColor = "bg-indigo-100 text-indigo-700 border-indigo-200";
                    let dotColor = "bg-indigo-500 shadow-[0_0_8px_rgba(99,102,241,0.4)]";
                    
                    if (title.toLowerCase().includes('detected')) {
                        badgeColor = "bg-sky-100 text-sky-700 border-sky-200";
                        dotColor = "bg-sky-500 shadow-[0_0_8px_rgba(14,165,233,0.4)]";
                    } else if (title.toLowerCase().includes('classified') || title.toLowerCase().includes('why it')) {
                        badgeColor = "bg-purple-100 text-purple-700 border-purple-200";
                        dotColor = "bg-purple-500 shadow-[0_0_8px_rgba(168,85,247,0.4)]";
                    } else if (title.toLowerCase().includes('visual') || title.toLowerCase().includes('evidence')) {
                        badgeColor = "bg-pink-100 text-pink-700 border-pink-200";
                        dotColor = "bg-pink-500 shadow-[0_0_8px_rgba(236,72,153,0.4)]";
                    } else if (title.toLowerCase().includes('recommendation') || title.toLowerCase().includes('increase')) {
                        badgeColor = "bg-amber-100 text-amber-700 border-amber-200";
                        dotColor = "bg-amber-500 shadow-[0_0_8px_rgba(245,158,11,0.4)]";
                    }
                    
                    li.innerHTML = `
                        <div class="absolute -left-[31px] top-1.5 h-3.5 w-3.5 rounded-full ${dotColor} border-2 border-white transition-transform group-hover:scale-125 duration-300"></div>
                        <div class="inline-block mb-2 px-2.5 py-1 rounded-md text-[10px] font-bold uppercase tracking-wider border ${badgeColor}">${title}</div>
                        <div class="text-sm text-slate-600 font-medium leading-relaxed bg-white/60 hover:bg-white transition-colors p-4 rounded-2xl border border-slate-100 shadow-sm hover:shadow-md">${text}</div>
                    `;
                } else {
                    li.innerHTML = `
                        <div class="absolute -left-[31px] top-1.5 h-3.5 w-3.5 rounded-full bg-slate-300 border-2 border-white transition-transform group-hover:scale-125 duration-300"></div>
                        <div class="text-sm text-slate-600 font-medium leading-relaxed bg-white/60 hover:bg-white transition-colors p-4 rounded-2xl border border-slate-100 shadow-sm hover:shadow-md">${item}</div>
                    `;
                }
                evidenceUl.appendChild(li);
            });

            // 2. Rebuild Linear Contributions View
            const metricsContainer = document.getElementById('metricsBreakdown');
            metricsContainer.innerHTML = '';
            const weightsMap = { structural_diff_contribution: 0.25, semantic_text_diff_contribution: 0.35, domain_signal_contribution: 0.25, vlm_judgment_contribution: 0.15 };

            for (const [key, value] of Object.entries(data.metrics_breakdown)) {
                if(key.endsWith('_contribution')) {
                    const maxWeight = weightsMap[key] || 1.0;
                    const fillPercentage = Math.min((value / maxWeight) * 100, 100);
                    const displayKey = key.replace(/_contribution/g, '').replace(/_/g, ' ');
                    
                    const displayValue = (value * 100).toFixed(1); 
                    const displayMax = (maxWeight * 100).toFixed(0);
                    
                    metricsContainer.innerHTML += `
                        <div class="space-y-2 group">
                            <div class="flex justify-between items-center text-xs">
                                <span class="font-semibold text-slate-600 capitalize tracking-wide group-hover:text-indigo-600 transition-colors">${displayKey}</span>
                                <span class="font-mono font-bold text-slate-800">${displayValue} <span class="text-slate-400 font-normal">/ ${displayMax}</span></span>
                            </div>
                            <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden border border-slate-200/50 shadow-inner">
                                <div class="bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 h-full rounded-full transition-all duration-1000 ease-out group-hover:brightness-110" style="width: ${fillPercentage}%"></div>
                            </div>
                        </div>
                    `;
                }
            }

            // 3. Rebuild Grid Activity Matrix
            const domainContainer = document.getElementById('domainActivity');
            domainContainer.innerHTML = '';
            
            let delayIndex = 0;
            for (const [domain, details] of Object.entries(data.domain_activity)) {
                const animDelay = delayIndex * 50;
                delayIndex++;
                
                if (details.is_active) {
                    const domainScoreDisplay = (details.progress_score * 100).toFixed(0);
                    domainContainer.innerHTML += `
                        <div class="animate-slide-up glass-pill-active flex justify-between items-center px-4 py-3 rounded-xl transition-all duration-300 hover:scale-105 hover:shadow-lg" style="animation-delay: ${animDelay}ms; opacity: 0; animation-fill-mode: forwards;">
                            <span class="text-sm font-black text-emerald-800 capitalize flex items-center tracking-wide">
                                <span class="relative flex h-3 w-3 mr-3">
                                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                                  <span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.8)] animate-pulse-glow"></span>
                                </span>
                                ${domain}
                            </span>
                            <span class="font-mono text-sm font-black text-white bg-emerald-500 px-3 py-1 rounded-lg shadow-[0_4px_10px_rgba(16,185,129,0.3)] border border-emerald-400" style="border-color: rgba(52, 211, 153, 0.5)">${domainScoreDisplay}</span>
                        </div>
                    `;
                } else {
                    domainContainer.innerHTML += `
                        <div class="animate-slide-up glass-pill-idle flex justify-between items-center px-4 py-3 rounded-xl transition-all duration-300 opacity-60 hover:opacity-100" style="animation-delay: ${animDelay}ms; opacity: 0; animation-fill-mode: forwards;">
                            <span class="text-sm text-slate-500 font-semibold capitalize flex items-center">
                                <span class="h-2 w-2 rounded-full bg-slate-300 mr-3"></span>
                                ${domain}
                            </span>
                            <span class="text-[10px] font-mono font-black text-slate-400 uppercase tracking-widest bg-white/50 px-2 py-0.5 rounded border border-slate-200">Idle</span>
                        </div>
                    `;
                }
            }

            document.getElementById('rawJson').textContent = JSON.stringify(data, null, 2);
        }
    </script>

</body>
</html>
